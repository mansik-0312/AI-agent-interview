services:
  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    networks:
      - livekit-net

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50020:50000-50020/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    depends_on:
      - redis
    networks:
      - livekit-net

  egress-init:
    image: busybox
    container_name: livekit-egress-init
    command: sh -c "chmod 777 /out && echo 'permissions fixed'"
    volumes:
      - ./recordings:/out        # ← bind mount
    restart: "no"

  egress:
    image: livekit/egress:latest
    container_name: livekit-egress
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress.yaml
      - ./recordings:/out        # ← bind mount to Windows folder
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    depends_on:
      - redis
      - livekit
      - egress-init
    networks:
      - livekit-net

networks:
  livekit-net:
    driver: bridge