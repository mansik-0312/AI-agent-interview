name: HRMS FastAPI Email Service CI/CD

on:
  push:
    branches:
      - email-service-onboarding

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy HRMS FastAPI Email Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "🚀 Connected to HRMS Email Service Server"

            eval "$(ssh-agent -s)"

            cd /home/projects/hrms-fastapi-email

            echo "📌 Pulling branch: email-service-onboarding"
            git fetch origin
            git checkout email-service-onboarding
            git pull origin email-service-onboarding

            echo "🐳 Building & running Email Service containers"
            docker compose -f docker-compose.yml up -d --build

            echo "✅ HRMS FastAPI Email Service CI/CD completed successfully"
